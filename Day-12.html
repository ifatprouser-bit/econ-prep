<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 12 — Reasoning & Graph Day</title>
<style>
  :root{
    --bg:#f5f3fb; --card:#ffffff; --ink:#211c33; --muted:#6f6886;
    --brand:#6b4ef0; --brand-d:#5238c4; --brand-soft:#ece7fd;
    --good:#1f9d63; --good-soft:#e4f6ec; --bad:#d2453f; --bad-soft:#fae5e4; --line:#e7e3f2;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink); margin:0; line-height:1.5;}
  .wrap{max-width:760px; margin:0 auto; padding:26px 22px 60px;}
  .back{display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--brand); font-weight:600; font-size:14px; margin-bottom:18px;}
  .back:hover{text-decoration:underline;}
  .crumb{color:var(--brand); font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:.05em;}
  h1{font-size:28px; margin:8px 0 4px; letter-spacing:-.02em;}
  .lede{color:var(--muted); margin:0 0 22px; font-size:16px;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px 24px; margin:16px 0; box-shadow:0 1px 3px rgba(40,20,90,.04);}
  .panel h3{margin:0 0 4px; font-size:17px; display:flex; align-items:center; gap:8px;}
  .panel .note{color:var(--muted); font-size:14px; margin:0 0 14px;}
  .scorechip{margin-left:auto; font-size:13px; color:var(--muted); font-weight:600;}
  audio{width:100%; margin-top:6px;}
  .takeaway{font-size:14.5px; background:#fbfaff; border:1px dashed var(--line); border-radius:11px; padding:13px 16px; margin-top:14px;}
  .takeaway b{color:var(--brand);}
  .qblock{padding:16px 0; border-top:1px solid var(--line);}
  .qblock:first-of-type{border-top:none; padding-top:4px;}
  .qnum{color:var(--brand); font-weight:700; font-size:12px; letter-spacing:.04em; text-transform:uppercase;}
  .qtext{font-weight:600; margin:6px 0 12px; font-size:16px;}
  .opt{display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line);
    border-radius:11px; padding:11px 14px; margin:7px 0; font-size:15px; cursor:pointer; transition:.14s; color:var(--ink);}
  .opt:hover{border-color:var(--brand); background:var(--brand-soft);}
  .opt.correct{border-color:var(--good); background:var(--good-soft);}
  .opt.wrong{border-color:var(--bad); background:var(--bad-soft);}
  .opt:disabled{cursor:default;}
  .opt .mark{float:right; font-weight:700;}
  .exp{margin-top:11px; padding:13px 15px; border-radius:11px; background:#faf9fe; border:1px dashed var(--line); font-size:14px; display:none;}
  .exp.show{display:block;} .exp b{color:var(--brand);}
  .formula{background:#fbfaff; border:1px solid var(--line); border-radius:12px; padding:14px 18px; font-size:14px; margin:16px 0;}
  .formula code{background:var(--brand-soft); color:var(--brand-d); padding:1px 6px; border-radius:5px; font-size:13px;}
  .timer{background:var(--brand); color:#fff; border-radius:12px; padding:10px 16px; font-weight:700; font-size:16px; display:inline-flex; align-items:center; gap:10px;}
  .timer button{background:rgba(255,255,255,.2); border:none; color:#fff; border-radius:8px; padding:4px 10px; cursor:pointer; font-weight:600;}
  .navrow{display:flex; justify-content:space-between; margin-top:22px; gap:10px;}
  .navbtn{text-decoration:none; font-weight:600; font-size:14px; padding:10px 16px; border-radius:11px; border:1px solid var(--line); color:var(--ink); background:#fff;}
  .navbtn.dim{color:var(--muted); pointer-events:none; opacity:.45;}
  .navbtn.primary{background:var(--brand); color:#fff; border-color:var(--brand);}
  .navbtn:hover{border-color:var(--brand);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="Economics-Exam-Prep.html">&larr; All days</a>
  <div class="crumb">Day 12 of 14 &middot; Practice</div>
  <h1>Reasoning & Graph Day</h1>
  <p class="lede">Shifts, government interference, and spotting 'cannot be known'.</p>

  
  
  

  <div class="panel">
    <h3>📝 Reasoning set <span class="scorechip" id="scoreChip">0 / 6</span></h3>
    <p class="note">No calculator needed — reason through each shift, then check your logic.</p>
    <div id="quizBody"></div>
  </div>

  

  <div class="navrow">
    <a class="navbtn" href="Day-11.html">&larr; Day 11</a>
    <a class="navbtn primary" href="Day-13.html">Day 13 &rarr;</a>
  </div>
</div>

<script>
const QUIZ = [{"q": "A subsidy is given to sellers of a good. Price and quantity:", "opts": ["Price falls, quantity rises.", "Price rises, quantity falls.", "Both rise.", "Both fall."], "correct": 0, "exp": "Subsidy shifts <b>supply right</b> → lower price, higher quantity."}, {"q": "Buyers' incomes rise and the good is normal, AND at the same time a new tax shifts supply left. The change in PRICE is:", "opts": ["Definitely higher.", "Definitely lower.", "Cannot be known.", "Unchanged."], "correct": 0, "exp": "Demand right + supply left both push <b>price up</b> (known). Quantity is the ambiguous one here."}, {"q": "Same case (demand right, supply left). The change in QUANTITY is:", "opts": ["Definitely higher.", "Cannot be known without the sizes of the shifts.", "Definitely lower.", "Zero."], "correct": 1, "exp": "The two shifts pull quantity in opposite directions, so <b>quantity cannot be known</b>. Classic trap."}, {"q": "A binding price ceiling (below equilibrium) is imposed. The quantity actually traded is set by:", "opts": ["Quantity supplied at the ceiling (the short side).", "Quantity demanded at the ceiling.", "The old equilibrium quantity.", "Whatever buyers want."], "correct": 0, "exp": "In a shortage, sellers are the limiting side, so trade = <b>quantity supplied</b> at the controlled price."}, {"q": "A price FLOOR set ABOVE equilibrium leads to:", "opts": ["A surplus, with fewer units actually sold.", "A shortage.", "No change.", "More units sold than before."], "correct": 0, "exp": "Floor above equilibrium → <b>surplus</b>; quantity sold drops to quantity demanded at the higher price."}, {"q": "New technology makes it easy to verify used-car quality. In the SHORT run price rises; in the LONG run, profits:", "opts": ["Return toward zero (entry competes them away).", "Stay permanently high.", "Become negative forever.", "Are unaffected from the start."], "correct": 0, "exp": "Better information lifts demand and short-run profit, but free <b>entry</b> drives long-run economic profit back to zero."}];
const body=document.getElementById('quizBody');
let score=0;
QUIZ.forEach((item,qi)=>{
  const block=document.createElement('div'); block.className='qblock';
  block.innerHTML=`<div class="qnum">Question ${qi+1}</div><div class="qtext">${item.q}</div>`;
  const exp=document.createElement('div'); exp.className='exp'; exp.innerHTML=item.exp;
  item.opts.forEach((opt,oi)=>{
    const btn=document.createElement('button'); btn.className='opt';
    btn.innerHTML=`${String.fromCharCode(65+oi)}. ${opt}<span class="mark"></span>`;
    btn.onclick=()=>{
      if(block.dataset.done) return;
      block.dataset.done="1";
      const btns=block.querySelectorAll('.opt'); btns.forEach(x=>x.disabled=true);
      btns[item.correct].classList.add('correct'); btns[item.correct].querySelector('.mark').textContent='✓';
      if(oi===item.correct){score++;} else {btn.classList.add('wrong'); btn.querySelector('.mark').textContent='✗';}
      document.getElementById('scoreChip').textContent=`${score} / ${QUIZ.length}`;
      exp.classList.add('show');
    };
    block.appendChild(btn);
  });
  block.appendChild(exp); body.appendChild(block);
});

</script>
</body>
</html>
